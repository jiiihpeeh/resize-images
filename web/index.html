<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resizer Service</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --border-color: #e5e7eb;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        #app { width: 100%; max-width: 600px; }
        .card {
            background-color: var(--card-bg);
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 2rem;
            margin-bottom: 2rem;
        }
        h1, h2 { margin-top: 0; color: var(--text-color); }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.375rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }
        .tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); }
        .tab {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            font-weight: 500;
            color: #6b7280;
        }
        .tab.active { border-bottom-color: var(--primary-color); color: var(--primary-color); }
        #result-area { text-align: center; margin-top: 2rem; }
        #result-image { max-width: 100%; border-radius: 0.375rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .msg { margin-top: 1rem; font-size: 0.875rem; text-align: center; }
        .error { color: #dc2626; }
        .success { color: #059669; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .progress-bar-container {
            width: 100%;
            background-color: #e5e7eb;
            border-radius: 0.375rem;
            overflow: hidden;
            height: 1rem;
            margin-top: 1rem;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: var(--primary-color);
            transition: width 0.2s ease-in-out;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        import { h, render } from 'https://esm.sh/preact@10.19.6';
        import { useState, useCallback } from 'https://esm.sh/preact@10.19.6/hooks';
        import htm from 'https://esm.sh/htm@3.1.1';

        const html = htm.bind(h);

        const AuthView = ({ onLogin }) => {
            const [activeTab, setActiveTab] = useState('login');
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [secret, setSecret] = useState('');
            const [message, setMessage] = useState('');
            const [loading, setLoading] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setMessage('');
                try {
                    const res = await fetch('/auth/login', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ username, password })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        onLogin(data.token);
                    } else {
                        setMessage({ type: 'error', text: data.error });
                    }
                } catch (err) {
                    setMessage({ type: 'error', text: 'Connection error' });
                }
                setLoading(false);
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                setLoading(true);
                setMessage('');
                try {
                    const headers = {'Content-Type': 'application/json'};
                    if (secret) headers['X-Registration-Secret'] = secret;

                    const res = await fetch('/auth/register', {
                        method: 'POST',
                        headers,
                        body: JSON.stringify({ username })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setMessage({ type: 'success', text: `Registered! Your passkey is: ${data.passkey}` });
                    } else {
                        setMessage({ type: 'error', text: data.error });
                    }
                } catch (err) {
                    setMessage({ type: 'error', text: 'Connection error' });
                }
                setLoading(false);
            };

            return html`
                <div class="card">
                    <h1>Image Resizer</h1>
                    <div class="tabs">
                        <div class=${`tab ${activeTab === 'login' ? 'active' : ''}`} onClick=${() => setActiveTab('login')}>Login</div>
                        <div class=${`tab ${activeTab === 'register' ? 'active' : ''}`} onClick=${() => setActiveTab('register')}>Register</div>
                    </div>

                    ${activeTab === 'login' ? html`
                        <form onSubmit=${handleLogin}>
                            <div class="form-group">
                                <label>Username</label>
                                <input type="text" value=${username} onInput=${e => setUsername(e.target.value)} required />
                            </div>
                            <div class="form-group">
                                <label>Password or Passkey</label>
                                <input type="password" value=${password} onInput=${e => setPassword(e.target.value)} required />
                            </div>
                            <button type="submit" disabled=${loading}>${loading ? 'Logging in...' : 'Login'}</button>
                        </form>
                    ` : html`
                        <form onSubmit=${handleRegister}>
                            <div class="form-group">
                                <label>Username</label>
                                <input type="text" value=${username} onInput=${e => setUsername(e.target.value)} required />
                            </div>
                            <div class="form-group">
                                <label>Registration Secret</label>
                                <input type="password" value=${secret} onInput=${e => setSecret(e.target.value)} required />
                            </div>
                            <button type="submit" disabled=${loading}>${loading ? 'Registering...' : 'Register'}</button>
                        </form>
                    `}
                    ${message && html`<div class=${`msg ${message.type}`}>${message.text}</div>`}
                </div>
            `;
        };

        const ResizerView = ({ token, onLogout }) => {
            const [file, setFile] = useState(null);
            const [tasks, setTasks] = useState([{ width: '', height: '', format: 'jpg', quality: '80', prefix: '' }]);
            const [message, setMessage] = useState('');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);

            const addTask = () => {
                setTasks([...tasks, { width: '', height: '', format: 'jpg', quality: '80', prefix: '' }]);
            };

            const removeTask = (index) => {
                setTasks(tasks.filter((_, i) => i !== index));
            };

            const updateTask = (index, field, value) => {
                const newTasks = [...tasks];
                newTasks[index] = { ...newTasks[index], [field]: value };
                setTasks(newTasks);
            };

            const handleResize = (e) => {
                e.preventDefault();
                if (!file) {
                    setMessage({ type: 'error', text: 'Please select an image file.' });
                    return;
                }
                setLoading(true);
                setResult(null);
                setMessage('');

                setStatusText('Uploading...');
                const formData = new FormData();
                formData.append('image', file);

                const apiTasks = tasks.map(t => ({
                    width: parseInt(t.width) || 0,
                    height: parseInt(t.height) || 0,
                    format: t.format,
                    quality: parseInt(t.quality) || 80,
                    prefix: t.prefix
                }));
                formData.append('tasks', JSON.stringify(apiTasks));

                const xhr = new XMLHttpRequest();
                const progressBarContainer = document.getElementById('progress-container');
                const progressBar = document.getElementById('progress-bar');
                
                if(progressBarContainer) progressBarContainer.style.display = 'block';
                if(progressBar) progressBar.style.width = '0%';

                xhr.upload.addEventListener('progress', (event) => {
                    if (event.lengthComputable && progressBar) {
                        const percentComplete = (event.loaded / event.total) * 100;
                        progressBar.style.width = percentComplete + '%';
                        if (percentComplete === 100) {
                            setStatusText('Processing...');
                        }
                    }
                });

                xhr.addEventListener('load', () => {
                    setLoading(false);
                    if(progressBarContainer) progressBarContainer.style.display = 'none';

                    if (xhr.status === 200) {
                        const blob = xhr.response;
                        const url = URL.createObjectURL(blob);
                        setResult({ url });
                    } else {
                        try {
                            const data = JSON.parse(xhr.responseText);
                            setMessage({ type: 'error', text: data.error || 'Processing failed' });
                        } catch (err) {
                            setMessage({ type: 'error', text: `Request failed with status ${xhr.status}` });
                        }
                    }
                });

                xhr.addEventListener('error', () => {
                    setLoading(false);
                    if(progressBarContainer) progressBarContainer.style.display = 'none';
                    setMessage({ type: 'error', text: 'Upload failed due to a network error.' });
                });

                xhr.open('POST', '/resize');
                xhr.setRequestHeader('Authorization', `Bearer ${token}`);
                xhr.responseType = 'blob';
                xhr.send(formData);
            };

            return html`
                <div class="card">
                    <div style=${{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem'}}>
                        <h2>Resize Image</h2>
                        <button onClick=${onLogout} style=${{width: 'auto', backgroundColor: '#ef4444'}}>Logout</button>
                    </div>

                    <form onSubmit=${handleResize}>
                        <div class="form-group">
                            <label>Image File</label>
                            <input type="file" accept="image/*" onChange=${e => setFile(e.target.files[0])} required />
                        </div>

                        <h3>Output Variants</h3>
                        ${tasks.map((task, index) => html`
                            <div style=${{border: '1px solid #e5e7eb', padding: '1rem', borderRadius: '0.5rem', marginBottom: '1rem', backgroundColor: '#f9fafb'}}>
                                <div style=${{display: 'flex', justifyContent: 'space-between', marginBottom: '0.5rem'}}>
                                    <strong>Variant ${index + 1}</strong>
                                    ${tasks.length > 1 && html`
                                        <button type="button" onClick=${() => removeTask(index)} style=${{width: 'auto', padding: '0.25rem 0.5rem', fontSize: '0.875rem', backgroundColor: '#ef4444'}}>Remove</button>
                                    `}
                                </div>
                                <div class="form-group">
                                    <label>Filename Prefix (Optional)</label>
                                    <input type="text" placeholder="e.g. thumbnail" value=${task.prefix} onInput=${e => updateTask(index, 'prefix', e.target.value)} />
                                </div>
                                <div class="grid">
                                    <div class="form-group">
                                        <label>Width (px)</label>
                                        <input type="number" placeholder="Original" value=${task.width} onInput=${e => updateTask(index, 'width', e.target.value)} />
                                    </div>
                                    <div class="form-group">
                                        <label>Height (px)</label>
                                        <input type="number" placeholder="Original" value=${task.height} onInput=${e => updateTask(index, 'height', e.target.value)} />
                                    </div>
                                </div>
                                <div class="grid">
                                    <div class="form-group">
                                        <label>Format</label>
                                        <select value=${task.format} onChange=${e => updateTask(index, 'format', e.target.value)}>
                                            <option value="jpg">JPEG</option>
                                            <option value="png">PNG</option>
                                            <option value="webp">WebP</option>
                                            <option value="avif">AVIF</option>
                                            <option value="jxl">JPEG XL</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>Quality (1-100)</label>
                                        <input type="number" value=${task.quality} min="1" max="100" onInput=${e => updateTask(index, 'quality', e.target.value)} />
                                    </div>
                                </div>
                            </div>
                        `)}

                        <button type="button" onClick=${addTask} style=${{marginBottom: '1rem', backgroundColor: '#6b7280'}}>+ Add Variant</button>

                        <button type="submit" disabled=${loading}>${loading ? statusText : 'Process Images'}</button>

                        <div id="progress-container" style="display: none;">
                            <div class="progress-bar-container">
                                <div id="progress-bar" class="progress-bar"></div>
                            </div>
                        </div>
                    </form>

                    ${message && html`<div class=${`msg ${message.type}`}>${message.text}</div>`}

                    ${result && html`
                        <div id="result-area">
                            <h3>Result</h3>
                            <p>Processing complete!</p>
                            <a href=${result.url} download="images.tar.gz" style=${{display: 'inline-block', padding: '0.75rem 1.5rem', backgroundColor: '#059669', color: 'white', textDecoration: 'none', borderRadius: '0.375rem'}}>Download Archive</a>
                        </div>
                    `}
                </div>
            `;
        };

        const App = () => {
            const [token, setToken] = useState(localStorage.getItem('token'));

            const handleLogin = useCallback((newToken) => {
                localStorage.setItem('token', newToken);
                setToken(newToken);
            }, []);

            const handleLogout = useCallback(() => {
                localStorage.removeItem('token');
                setToken(null);
            }, []);

            return html`
                <div>
                    ${token
                        ? html`<${ResizerView} token=${token} onLogout=${handleLogout} />`
                        : html`<${AuthView} onLogin=${handleLogin} />`
                    }
                </div>
            `;
        };

        render(html`<${App} />`, document.getElementById('app'));
    </script>
</body>
</html>
