services:
  image-resizer:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - JWT_SECRET=your-secret-key-change-in-production
      - QUALITY_WEBP=80
      - QUALITY_AVIF=60
      - QUALITY_JPEG=80
      - QUALITY_PNG=80
      - QUALITY_JXL=75
      - MAX_WIDTH=4096
      - MAX_HEIGHT=4096
    restart: unless-stopped
